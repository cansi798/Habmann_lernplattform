name: Build LaTeX PDFs

on:
  push:
    branches: [content-pipeline, main]
    paths:
      - 'tex/**/*.tex'
      - '.github/workflows/build-pdfs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-pdfs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install TeX Live (xelatex + German + extra fonts)
        run: |
          set -e
          sudo apt-get update -qq
          # Required packages: install in chunks so a single bad name doesn't sink the install
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-lang-german \
            texlive-fonts-extra \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            texlive-latex-extra
          # Optional add-ons — try each individually, don't fail the build if missing
          for pkg in texlive-pictures texlive-science fonts-charter fonts-caveat fonts-cabin; do
            sudo apt-get install -y --no-install-recommends "$pkg" || echo "::warning::optional package $pkg not available, skipping"
          done
          xelatex --version | head -1

      - name: Build all PDFs
        run: |
          set -e
          mkdir -p docs/pdf
          FAILED=()

          build_one() {
            local tex_path="$1"
            local out_name="$2"
            local dir
            dir=$(dirname "$tex_path")
            local base
            base=$(basename "$tex_path" .tex)
            echo "::group::Build $tex_path -> docs/pdf/$out_name.pdf"
            (
              cd "$dir"
              xelatex -interaction=nonstopmode -halt-on-error "$base.tex" > /tmp/xelatex.log 2>&1 || {
                echo "::error file=$tex_path::xelatex pass 1 failed"
                tail -50 /tmp/xelatex.log
                return 1
              }
              xelatex -interaction=nonstopmode -halt-on-error "$base.tex" > /tmp/xelatex.log 2>&1 || {
                echo "::error file=$tex_path::xelatex pass 2 failed"
                tail -50 /tmp/xelatex.log
                return 1
              }
            )
            if [ -f "$dir/$base.pdf" ]; then
              cp "$dir/$base.pdf" "docs/pdf/$out_name.pdf"
              echo "  -> docs/pdf/$out_name.pdf"
            else
              echo "::error file=$tex_path::no pdf produced"
              return 1
            fi
            echo "::endgroup::"
          }

          for tex in tex/handout/*.tex; do
            [ -f "$tex" ] || continue
            base=$(basename "$tex" .tex)
            out="${base/-tag-/-handout-tag-}"
            build_one "$tex" "$out" || FAILED+=("$tex")
          done

          for type in aufgaben loesungen; do
            for tex in tex/$type/*.tex; do
              [ -f "$tex" ] || continue
              base=$(basename "$tex" .tex)
              build_one "$tex" "$base" || FAILED+=("$tex")
            done
          done

          find tex -type f \( -name "*.aux" -o -name "*.log" -o -name "*.out" -o -name "*.toc" \) -delete

          if [ ${#FAILED[@]} -ne 0 ]; then
            echo ""
            echo "::error::${#FAILED[@]} file(s) failed to build:"
            printf '  - %s\n' "${FAILED[@]}"
            exit 1
          fi

      - name: Commit + push PDFs
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/pdf/*.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes to commit"
            exit 0
          fi
          git commit -m "ci: rebuild PDFs [skip ci]"
          git push
